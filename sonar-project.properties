# Replace these two values with what SonarCloud shows you during setup
sonar.projectKey=LiviuLvu_gitpipe
sonar.organization=liviulvu

sonar.projectName=gitpipe
sonar.projectVersion=1.0

# Source and test paths
sonar.sources=src
sonar.tests=src
sonar.test.inclusions=**/*.spec.ts
sonar.exclusions=**/*.spec.ts,**/node_modules/**,**/dist/**

# Point SonarCloud at the lcov report generated by ng test
sonar.javascript.lcov.reportPaths=coverage/gitpipe/lcov.info
